<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Water — 首页 & 视频播放页 预览</title>
<style>
  :root {
    --bg: #060E14;
    --card: #0A1620;
    --card-hover: #0E1E2C;
    --accent: #00D4AA;
    --accent2: #0288D1;
    --danger: #FF6B6B;
    --text: #E0E0E0;
    --text2: #9AB8B0;
    --text3: #5A7A72;
    --border: #1C2E36;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: #0D1117;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px; gap: 16px; min-height: 100vh;
  }
  .page-row {
    display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; justify-content: center;
  }
  .page-label {
    color: var(--text); font-size: 14px; font-weight: 600; text-align: center; margin-bottom: 8px;
  }
  .arrow-label {
    display: flex; align-items: center; gap: 8px; color: var(--accent); font-size: 13px;
    margin: 8px 0;
  }
  .screen {
    width: 800px; height: 480px; border-radius: 16px;
    overflow: hidden; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  /* ========== HOME PAGE ========== */
  .home-bg {
    width:100%; height:100%;
    background: linear-gradient(180deg, #060E14 0%, #0A1620 60%, #060E14 100%);
    display:flex; flex-direction:column; align-items:center;
  }
  .home-header {
    display:flex; flex-direction:column; align-items:center;
    padding-top:36px; padding-bottom:16px; gap:6px;
  }
  .logo-circle {
    width:56px; height:56px; border-radius:50%;
    background: linear-gradient(180deg, #00D4AA 0%, #0288D1 100%);
    box-shadow: 0 0 24px rgba(0,212,170,0.4);
    display:flex; align-items:center; justify-content:center;
    font-size:28px; color:#fff;
  }
  .home-title { font-size:22px; color:#E6F2EE; font-weight:600; margin-top:4px; }
  .home-sub { font-size:12px; color:var(--text3); letter-spacing:3px; }
  .home-body {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:28px; width:100%;
  }
  .welcome-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:32px 48px;
    display:flex; flex-direction:column; align-items:center; gap:12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .welcome-icon { font-size:48px; }
  .welcome-text { color:var(--text); font-size:18px; }
  .welcome-sub { color:var(--text3); font-size:13px; }
  .nav-video-btn {
    padding:14px 48px; border-radius:12px;
    background: linear-gradient(180deg, #00D4AA 0%, #0288D1 100%);
    border:none; color:#fff; font-size:16px; font-weight:600;
    cursor:pointer; box-shadow: 0 4px 20px rgba(0,212,170,0.35);
    display:flex; align-items:center; gap:10px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .nav-video-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(0,212,170,0.5); }
  .nav-video-btn:active { transform: scale(0.97); }
  .home-footer {
    padding:10px 0 14px; color:var(--text3); font-size:11px;
    border-top:1px solid var(--border); width:100%; text-align:center;
  }

  /* ========== VIDEO PAGE ========== */
  .video-bg {
    width:100%; height:100%;
    background: linear-gradient(180deg, #060E14 0%, #0A1620 50%, #060E14 100%);
    display:flex; flex-direction:column;
  }
  .video-topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px; flex-shrink:0;
  }
  .back-btn {
    display:flex; align-items:center; gap:6px;
    background:var(--card); border:1px solid var(--border);
    color:var(--text2); padding:7px 14px; border-radius:8px;
    cursor:pointer; font-size:13px; transition: all 0.15s;
  }
  .back-btn:hover { background:var(--card-hover); color:var(--text); }
  .video-title { color:var(--text); font-size:16px; font-weight:600; }
  .video-status {
    color:var(--accent); font-size:11px;
    display:flex; align-items:center; gap:6px;
  }
  .live-dot {
    width:8px; height:8px; border-radius:50%; background:var(--accent);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .video-area-wrap {
    flex:1; display:flex; align-items:center; justify-content:center;
    padding:8px 16px; min-height:0;
  }
  .video-area {
    width:100%; height:100%;
    background:#000; border-radius:12px;
    border:2px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
  }
  .video-placeholder {
    display:flex; flex-direction:column; align-items:center; gap:10px;
    color:var(--text3);
  }
  .video-placeholder .play-icon {
    width:56px; height:56px; border-radius:50%;
    background:rgba(0,212,170,0.12); border:2px solid rgba(0,212,170,0.25);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; color:var(--accent);
  }
  .video-placeholder .text { font-size:12px; color:var(--text3); }
  .mplayer-tag {
    position:absolute; top:10px; right:12px;
    background:rgba(0,212,170,0.10); color:var(--accent);
    padding:3px 9px; border-radius:5px; font-size:10px;
    border:1px solid rgba(0,212,170,0.15);
  }

  .progress-wrap { padding:0 16px 6px; flex-shrink:0; }
  .progress-bar {
    width:100%; height:5px; background:var(--card);
    border-radius:3px; position:relative; cursor:pointer;
    border:1px solid var(--border);
  }
  .progress-fill {
    height:100%; width:35%; background:var(--accent);
    border-radius:3px; transition: width 0.3s;
  }
  .progress-time {
    display:flex; justify-content:space-between;
    color:var(--text3); font-size:10px; margin-top:4px;
  }

  .controls-wrap {
    display:flex; align-items:center; justify-content:center;
    gap:14px; padding:6px 16px 12px; flex-shrink:0;
  }
  .ctrl-btn {
    width:42px; height:42px; border-radius:50%;
    background:var(--card); border:1px solid var(--border);
    color:var(--text); cursor:pointer; font-size:15px;
    display:flex; align-items:center; justify-content:center;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { background:var(--card-hover); border-color:var(--accent); color:var(--accent); }
  .ctrl-btn:active { transform: scale(0.93); }
  .ctrl-btn.play-btn {
    width:52px; height:52px; background:var(--accent); border:none;
    color:#000; font-size:18px; box-shadow:0 4px 16px rgba(0,212,170,0.35);
  }
  .ctrl-btn.play-btn:hover { background:#00E8BC; }

  .ctrl-label {
    display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  .ctrl-label span { font-size:9px; color:var(--text3); }

  .flow-arrow {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    color: var(--accent); font-size: 12px; padding: 0 10px;
  }
  .flow-arrow .arrow { font-size: 28px; }
</style>
</head>
<body>

<h2 style="color:#E0E0E0;font-size:16px;text-align:center;">
  智慧水产养殖系统 — UI 预览 (800×480)
</h2>
<div style="color:#5A7A72;font-size:12px;text-align:center;margin-bottom:4px;">
  首页点击「▶ 视频监控」→ 跳转视频页 → 视频页按「← 返回首页」回到首页
</div>

<div class="page-row">
  <!-- HOME PAGE -->
  <div>
    <div class="page-label">🏠 首页（登录成功后进入）</div>
    <div class="screen">
      <div class="home-bg">
        <div class="home-header">
          <div class="logo-circle">🐟</div>
          <div class="home-title">智能水产养殖系统</div>
          <div class="home-sub">AQUACULTURE &nbsp; CONTROL</div>
        </div>
        <div class="home-body">
          <div class="welcome-card">
            <div class="welcome-icon">🌊</div>
            <div class="welcome-text">欢迎使用智慧水产管理系统</div>
            <div class="welcome-sub">实时监控 · 智能预警 · 远程控制</div>
          </div>
          <button class="nav-video-btn">▶ 视频监控</button>
        </div>
        <div class="home-footer">Smart Water Aquaculture System v1.0</div>
      </div>
    </div>
  </div>

  <!-- ARROW -->
  <div class="flow-arrow">
    <div class="arrow">→</div>
    <div>点击</div>
    <div>视频监控</div>
  </div>

  <!-- VIDEO PAGE -->
  <div>
    <div class="page-label">🎬 视频播放页（按返回回到首页）</div>
    <div class="screen">
      <div class="video-bg">
        <!-- Top bar: back + title + LIVE -->
        <div class="video-topbar">
          <button class="back-btn">← 返回首页</button>
          <div class="video-title">实时视频监控</div>
          <div class="video-status"><div class="live-dot"></div> LIVE</div>
        </div>

        <!-- Video area — takes most of the space -->
        <div class="video-area-wrap">
          <div class="video-area">
            <div class="mplayer-tag">mplayer 渲染区</div>
            <div class="video-placeholder">
              <div class="play-icon">▶</div>
              <div class="text">视频播放区域</div>
              <div class="text" style="font-size:10px;color:#3E524C;">mplayer 将在此区域渲染视频画面</div>
            </div>
          </div>
        </div>

        <!-- Progress bar -->
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill"></div></div>
          <div class="progress-time"><span>01:23</span><span>03:56</span></div>
        </div>

        <!-- Control buttons -->
        <div class="controls-wrap">
          <div class="ctrl-label">
            <button class="ctrl-btn">🔉</button><span>音量-</span>
          </div>
          <div class="ctrl-label">
            <button class="ctrl-btn">🔊</button><span>音量+</span>
          </div>

          <div style="width:16px;"></div>

          <div class="ctrl-label">
            <button class="ctrl-btn">⏪</button><span>后退</span>
          </div>
          <div class="ctrl-label">
            <button class="ctrl-btn play-btn">⏯</button><span>播放</span>
          </div>
          <div class="ctrl-label">
            <button class="ctrl-btn">⏩</button><span>快进</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
